<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tale of Two Kingdoms</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="menu" class="card">
        <h1>Tale of Two Kingdoms</h1>
        <p class="sub">Choose player count, then create a room:</p>
        <div class="row mode-toggle" role="group" aria-label="Player count">
          <button id="mode2PlayersBtn" class="mode-btn active" type="button" aria-pressed="true">2 Players</button>
          <button id="mode4PlayersBtn" class="mode-btn" type="button" aria-pressed="false">4 Players</button>
        </div>
        <div class="row">
          <button id="createRoomBtn" type="button">Create Room</button>
        </div>
        <p id="menuMsg" class="msg"></p>
      </section>

      <section id="lobby" class="card hidden">
        <h2>Room <span id="roomCode"></span></h2>
        <p>Scan to join as controller:</p>
        <img id="qrImage" alt="Join QR" />
        <p><a id="joinLink" target="_blank" rel="noreferrer"></a></p>
        <p class="sub">Room size (before match starts):</p>
        <div class="row mode-toggle" role="group" aria-label="Lobby player count">
          <button id="lobbyMode2PlayersBtn" class="mode-btn active" type="button" aria-pressed="true">2 Players</button>
          <button id="lobbyMode4PlayersBtn" class="mode-btn" type="button" aria-pressed="false">4 Players</button>
        </div>
        <div class="row">
          <button id="applyLobbyModeBtn" type="button">Apply Player Count</button>
        </div>
        <p id="lobbyModeMsg" class="msg"></p>
        <p id="lobbyMsg" class="msg">Waiting for controllers...</p>
      </section>

      <section id="controllerPanel" class="card hidden">
        <h2>Controller</h2>
        <p id="controllerMsg" class="sub">Join a room to control your archer.</p>
        <div id="controllerJoin">
          <div class="row">
            <input id="roomInput" type="text" maxlength="4" placeholder="CODE" />
            <button id="joinBtn">Join</button>
          </div>
        </div>
        <section id="controls" class="controls hidden">
          <p class="sub">Drag in the aiming cone (auto shoots on cooldown)</p>
          <canvas id="pullPad" width="520" height="520"></canvas>
        </section>
      </section>

      <section id="hud" class="hud hidden">
        <div id="leftHud"></div>
        <div id="centerHud"></div>
        <div id="rightHud"></div>
      </section>

      <canvas id="game" class="hidden" width="1600" height="900"></canvas>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
